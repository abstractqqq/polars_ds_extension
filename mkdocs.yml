site_name: Polars-ds API References
site_url: https://polars-ds-extension.readthedocs.io/en/latest/

use_directory_urls: false

nav:
- Home: index.md
- Explorative Data Analysis: eda.md
- Pipeline: pipeline.md
- ML Metrics/Loss: metrics.md
- Linear Regression as Polars Expr: expr_linear.md
- Spline Smoothing Expr: expr_spline.md
- Numerical Functions Expr: num.md
- KNN as Polars Expr: expr_knn.md
- Statistics Expr: stats.md
- String Functions Expr: string.md
- Itertools Expr: expr_iter.md
- Sample and Split: sample_and_split.md
- Linear Models: linear_models.md
- Time Series Features: ts_features.md
- Compatibility with Arrays: compat.md
- Expression Expander: expander.md
- Miscellaneous: polars_ds.md

theme:
  name: material
  locale: en
  highlightjs: true

plugins:
- search
- section-index
- mkdocstrings:
    handlers:
      python:
        paths: [python]
        options:
          summary: true
          docstring_style: numpy
          show_submodules: true